<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Itinerary Planner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #E8F6F3 0%, #D5F4E6 50%, #C9EFE5 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(26, 118, 135, 0.15);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1A7687 0%, #2E9CAA 50%, #3BB3C0 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '🌊';
            position: absolute;
            font-size: 120px;
            opacity: 0.1;
            top: -20px;
            right: -20px;
        }

        .header h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 5px;
            position: relative;
            z-index: 1;
        }

        .header p {
            font-size: 16px;
            opacity: 0.95;
            position: relative;
            z-index: 1;
        }

        .language-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            background: rgba(255,255,255,0.15);
            padding: 6px;
            border-radius: 8px;
        }

        .language-toggle button {
            padding: 6px 14px;
            border: none;
            background: transparent;
            color: white;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            border-radius: 6px;
        }

        .language-toggle button.active {
            background: rgba(255,255,255,0.3);
        }

        .summary-section {
            padding: 35px 30px;
            background: linear-gradient(135deg, #FFF8E7 0%, #FFF6E0 100%);
            border-bottom: 3px dashed #FFB366;
        }

        .summary-title {
            font-size: 20px;
            font-weight: 700;
            color: #2E5F66;
            margin-bottom: 20px;
            text-align: center;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .summary-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid #FFD4A3;
            transition: all 0.3s;
        }

        .summary-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.15);
        }

        .summary-card .icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .summary-card .label {
            font-size: 11px;
            color: #2E5F66;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .summary-card .value {
            font-size: 24px;
            font-weight: 700;
            color: #1A7687;
        }

        .content {
            padding: 30px;
        }

        .itinerary-title {
            font-size: 18px;
            font-weight: 700;
            color: #2E5F66;
            margin-bottom: 20px;
            text-align: center;
        }

        .days-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .day-card {
            background: linear-gradient(135deg, #E8F6F3 0%, #D5F4E6 100%);
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #3BB3C0;
            transition: all 0.3s;
            cursor: pointer;
        }

        .day-card:hover {
            box-shadow: 0 10px 35px rgba(59, 179, 192, 0.2);
            transform: translateY(-5px);
        }

        .day-header {
            background: linear-gradient(135deg, #FF7F50 0%, #FFB366 100%);
            color: white;
            padding: 15px;
            text-align: center;
        }

        .day-number {
            font-size: 28px;
            font-weight: 700;
        }

        .day-name {
            font-size: 16px;
            font-weight: 600;
            margin-top: 5px;
        }

        .day-date {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 3px;
        }

        .weather-info {
            background: linear-gradient(135deg, #FFE4D4 0%, #FFD4C0 100%);
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #FFD4A3;
            font-size: 13px;
        }

        .weather-icon {
            font-size: 24px;
            margin-right: 8px;
        }

        .weather-temp {
            font-weight: 600;
            color: #1A7687;
        }

        .weather-desc {
            color: #2E5F66;
            font-size: 12px;
        }

        .day-content {
            padding: 15px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }

        .day-card.expanded .day-content {
            max-height: 500px;
        }

        .locations-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .location-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #3BB3C0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .location-item:hover {
            background: #F0FFFE;
            box-shadow: 0 3px 10px rgba(59, 179, 192, 0.15);
        }

        .location-name {
            font-size: 14px;
            font-weight: 600;
            color: #1A7687;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(26, 118, 135, 0.6);
            animation: fadeIn 0.3s;
            overflow-y: auto;
            padding: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            margin: 50px auto;
            padding: 0;
            border-radius: 18px;
            width: 90%;
            max-width: 550px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 25px 70px rgba(26, 118, 135, 0.3);
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #1A7687 0%, #2E9CAA 100%);
            color: white;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-radius: 18px 18px 0 0;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 22px;
            flex: 1;
            line-height: 1.4;
        }

        .close-btn {
            color: white;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-left: 15px;
        }

        .close-btn:hover {
            opacity: 0.7;
        }

        .modal-body {
            padding: 25px;
        }

        .detail-section {
            margin-bottom: 22px;
        }

        .detail-label {
            color: #FF7F50;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .detail-content {
            color: #2E5F66;
            font-size: 14px;
            line-height: 1.6;
        }

        .detail-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .detail-list li {
            padding-left: 20px;
            position: relative;
            color: #2E5F66;
        }

        .detail-list li:before {
            content: "🌴";
            position: absolute;
            left: 0;
        }

        .food-list li:before {
            content: "🍽️";
        }

        .shows-list li:before {
            content: "⭐";
        }

        .maps-button {
            display: inline-block;
            background: linear-gradient(135deg, #FF7F50 0%, #FFB366 100%);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            margin-top: 15px;
            font-size: 14px;
        }

        .maps-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 127, 80, 0.3);
        }

        .cn { display: none; }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 32px;
            }

            .summary-grid {
                grid-template-columns: 1fr;
            }

            .days-container {
                grid-template-columns: 1fr;
            }

            .modal-content {
                width: 95%;
                margin: 20px auto;
            }
        }
    </style>
</head>

            <div class="modal-body">

                <div class="detail-section">

                </div>

                <div class="detail-section">

                <div class="detail-section">

                    <div class="detail-content" id="modalParking"></div>
                </div>

                <div class="detail-section">
                    <div class="detail-label" id="foodLabel">🍽️ Top Bites</div>
                    <ul class="detail-list food-list" id="modalFoods"></ul>
                </div>

                <div class="detail-section" id="showsSection" style="display: none;">
                    <div class="detail-label" id="showsLabel">⭐ Must See</div>
                    <ul class="detail-list shows-list" id="modalShows"></ul>
                </div>

                <div class="detail-section">
                    <div class="detail-label" id="activitiesLabel">🎯 Activities</div>
                    <div class="detail-content" id="modalActivities"></div>
                </div>

                <div id="modalMapsSection">
                    <a id="modalMapsLink" class="maps-button" target="_blank">📍 View on Maps</a>
                </div>
            </div>
        </div>
    </div>

        function renderItinerary() {
            const itinerary = document.getElementById('itinerary');
            itinerary.innerHTML = '';

            tripData.days.forEach((day, dayIndex) => {
                const weather = weatherData[day.date] || { icon: '🌤️', temp: '28°C', desc: 'Pleasant', condition: 'Nice day' };

                const dayCard = document.createElement('div');
                dayCard.className = 'day-card';
                dayCard.onclick = () => toggleDay(dayCard);

                const dayHeader = document.createElement('div');
                dayHeader.className = 'day-header';
                dayHeader.innerHTML = `
                    <div class="day-number">${dayIndex + 1}</div>
                    <div class="day-name">${day.dayName[currentLanguage]}</div>
                    <div class="day-date">${new Date(day.date).toLocaleDateString(currentLanguage === 'en' ? 'en-US' : 'zh-CN', { month: 'short', day: 'numeric' })}</div>
                `;

                const weatherInfo = document.createElement('div');
                weatherInfo.className = 'weather-info';
                weatherInfo.innerHTML = `
                    <span class="weather-icon">${weather.icon}</span>
                    <span class="weather-temp">${weather.temp}</span>
                    <span class="weather-desc"> • ${weather.desc}</span>
                `;

                const dayContent = document.createElement('div');
                dayContent.className = 'day-content';

                const locationsList = document.createElement('div');
                locationsList.className = 'locations-list';

                day.activities.forEach((activity) => {
                    const locationItem = document.createElement('div');
                    locationItem.className = 'location-item';
                    locationItem.onclick = (e) => {
                        e.stopPropagation();
                        openModal(activity);
                    };

                    const locationName = document.createElement('div');
                    locationName.className = 'location-name';
                    locationName.textContent = `${activity.time} • ${activity.name[currentLanguage]}`;

                    locationItem.appendChild(locationName);
                    locationsList.appendChild(locationItem);
                });

                dayContent.appendChild(locationsList);
                dayCard.appendChild(dayHeader);
                dayCard.appendChild(weatherInfo);
                dayCard.appendChild(dayContent);
                itinerary.appendChild(dayCard);
            });

            updateLanguage();
        }

        function toggleDay(card) {
            card.classList.toggle('expanded');
        }

        function openModal(activity) {
            const modal = document.getElementById('activityModal');
            document.getElementById('modalTitle').textContent = activity.name[currentLanguage];
            document.getElementById('modalHours').textContent = activity.hours || translations[currentLanguage].notAvailable;
            document.getElementById('modalDistance').textContent = activity.distance || translations[currentLanguage].notAvailable;
            document.getElementById('modalDuration').textContent = activity.duration || translations[currentLanguage].notAvailable;
            document.getElementById('modalParking').textContent = activity.parking || translations[currentLanguage].noParking;
            document.getElementById('modalActivities').textContent = activity.activities || translations[currentLanguage].noActivities;

            const foodsList = document.getElementById('modalFoods');
            foodsList.innerHTML = '';
            if (activity.foods && activity.foods.length > 0) {
                activity.foods.slice(0, 3).forEach(food => {
                    const li = document.createElement('li');
                    li.textContent = food;
                    foodsList.appendChild(li);
                });
            }

            const showsSection = document.getElementById('showsSection');
            const showsList = document.getElementById('modalShows');
            showsList.innerHTML = '';
            if (activity.shows && activity.shows.length > 0) {
                showsSection.style.display = 'block';
                activity.shows.forEach(show => {
                    const li = document.createElement('li');
                    li.textContent = show;
                    showsList.appendChild(li);
                });
            } else {
                showsSection.style.display = 'none';
            }

            const mapsLink = document.getElementById('modalMapsLink');
            if (activity.mapsLink) {
                mapsLink.href = activity.mapsLink;
                document.getElementById('modalMapsSection').style.display = 'block';
            } else {
                document.getElementById('modalMapsSection').style.display = 'none';
            }

            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('activityModal').style.display = 'none';
        }

        function setLanguage(lang) {
            currentLanguage = lang;
            document.querySelectorAll('.language-toggle button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderItinerary();
        }

        function updateLanguage() {
            document.getElementById('headerTitle').textContent = tripData.title[currentLanguage];
            document.getElementById('headerDates').textContent = tripData.dates[currentLanguage];
            document.getElementById('summaryTitle').textContent = translations[currentLanguage].summaryTitle;
            document.getElementById('daysLabel').textContent = translations[currentLanguage].daysLabel;
            document.getElementById('countriesLabel').textContent = translations[currentLanguage].countriesLabel;
            document.getElementById('highlightsLabel').textContent = translations[currentLanguage].highlightsLabel;
            document.getElementById('itineraryTitle').textContent = translations[currentLanguage].itineraryTitle;

            document.getElementById('hoursLabel').textContent = translations[currentLanguage].hoursLabel;
            document.getElementById('distanceLabel').textContent = translations[currentLanguage].distanceLabel;
            document.getElementById('durationLabel').textContent = translations[currentLanguage].durationLabel;
            document.getElementById('parkingLabel').textContent = translations[currentLanguage].parkingLabel;
            document.getElementById('foodLabel').textContent = translations[currentLanguage].foodLabel;
            document.getElementById('showsLabel').textContent = translations[currentLanguage].showsLabel;
            document.getElementById('activitiesLabel').textContent = translations[currentLanguage].activitiesLabel;

            document.querySelectorAll('.en').forEach(el => el.style.display = currentLanguage === 'en' ? 'inline' : 'none');
            document.querySelectorAll('.cn').forEach(el => el.style.display = currentLanguage === 'cn' ? 'inline' : 'none');
        }

        window.onclick = function(event) {
            const modal = document.getElementById('activityModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }

        renderItinerary();
    </script>
