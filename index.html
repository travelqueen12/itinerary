            durationEN: "⏱️ Highway Transfer: 45 mins to Taoyuan Airport Terminal",
            durationZH: "⏱️ 车程：包车提前 3 小时直达桃园国际机场，司机协助卸载全部行李箱",
            isFlight: true,
            flightDetails: {
              carrier: "Malaysia Airlines / Tigerair",
              depTime: "15:45",
              terminal: "Taoyuan Int'l T1",
              gate: "A9",
              statusEN: "On Time / Gate Open",
              statusZH: "准点 / 开放登机"
            },
            shoppingEN: "Final duty-free sweets, premium Kavalan Single Malt Taiwanese Whisky, and local pastries.",
            shoppingZH: "机场免税店终极补货：推荐台湾顶级噶玛兰 (Kavalan) 威士忌、微热山丘凤梨酥及太阳饼。",
            foodEN: "Enjoy a premium warm Taiwanese beef noodle broth soup or classic braised pork rice combos at the terminal dining lounge.",
            foodZH: "登机前饱腹一顿：在机场美食广场来一碗热气腾腾的台式原汁牛肉面套餐，为旅程画上完美句号。"
          }
        ]
      }
    ];

    // --- INTERFACE DICTIONARY FOR INSTANT TRANSLATION ---
    const uiDictionary = {
      EN: {
        appTitle: "Family Travel App Dashboard",
        weatherTitle: "Live Weather Updates",
        cityOkinawa: "Okinawa (冲绳)",
        cityTaipei: "Taipei (台北)",
        langBtn: "中文",
        buyTitle: "🛍️ What to Buy / Shopping Focus",
        foodTitle: "🍲 Food Suggestion",
        flightBoardTitle: "FLIGHT TERMINAL CONTROLLER",
        schDep: "Sch. Departure",
        terminal: "Terminal",
        gate: "Gate",
        status: "Live Status"
      },
      ZH: {
        appTitle: "家族旅行专属随身仪表盘",
        weatherTitle: "实况天气同步更新",
        cityOkinawa: "日本冲绳",
        cityTaipei: "台湾台北",
        langBtn: "English",
        buyTitle: "🛍️ 必买推荐 / 购物焦点",
        foodTitle: "🍲 美食推荐",
        flightBoardTitle: "航空飞行实时大屏幕",
        schDep: "预计起飞时间",
        terminal: "登机航站楼",
        gate: "专属登机口",
        status: "航班实时动态"
      }
    };

    // --- TRANSLATION TOGGLE LOGIC ---
    function toggleLanguage() {
      currentLang = (currentLang === 'EN') ? 'ZH' : 'EN';
      document.getElementById('lang-btn-text').innerText = uiDictionary[currentLang].langBtn;
      
      // Update persistent layout elements
      document.getElementById('ui-app-title').innerText = uiDictionary[currentLang].appTitle;
      document.getElementById('ui-weather-title').innerText = uiDictionary[currentLang].weatherTitle;
      document.getElementById('ui-city-okinawa').innerText = uiDictionary[currentLang].cityOkinawa;
      document.getElementById('ui-city-taipei').innerText = uiDictionary[currentLang].cityTaipei;

      // Re-render variable layouts while maintaining chosen view states
      renderDayTabs();
      renderTimeline(currentDayIndex);
    }

    // --- ASYNC LIVE WEATHER FETCH ENGINE (Open-Meteo) ---
    async function fetchLiveWeather() {
      try {
        // Coordinates: Okinawa (Naha) ~26.21, 127.68 | Taipei ~25.03, 121.56
        const okinawaUrl = "https://api.open-meteo.com/v1/forecast?latitude=26.2125&longitude=127.6809&current_weather=true";
        const taipeiUrl = "https://api.open-meteo.com/v1/forecast?latitude=25.0330&longitude=121.5654&current_weather=true";

        const [resOki, resTpe] = await Promise.all([
          fetch(okinawaUrl).then(r => r.json()),
          fetch(taipeiUrl).then(r => r.json())
        ]);

        if (resOki && resOki.current_weather) {
          document.getElementById('okinawa-temp').innerText = `${Math.round(resOki.current_weather.temperature)}°C`;
          document.getElementById('okinawa-status').innerText = getWeatherStatusString(resOki.current_weather.weathercode);
        }
        if (resTpe && resTpe.current_weather) {
          document.getElementById('taipei-temp').innerText = `${Math.round(resTpe.current_weather.temperature)}°C`;
          document.getElementById('taipei-status').innerText = getWeatherStatusString(resTpe.current_weather.weathercode);
        }
      } catch (error) {
        console.error("Weather network pipeline error, applying default fallbacks:", error);
        // Fallbacks for May-June warm season weather simulation
        document.getElementById('okinawa-temp').innerText = "27°C";
        document.getElementById('okinawa-status').innerText = currentLang === 'EN' ? "Partly Cloudy" : "多云偏晴";
        document.getElementById('taipei-temp').innerText = "29°C";
        document.getElementById('taipei-status').innerText = currentLang === 'EN' ? "Mild Humidity" : "晴朗舒适";
      }
    }

    function getWeatherStatusString(code) {
      if (code === 0) return currentLang === 'EN' ? "Clear Sky" : "晴空万里";
      if (code <= 3) return currentLang === 'EN' ? "Partly Cloudy" : "多云间晴";
      if (code <= 65) return currentLang === 'EN' ? "Moderate Rain" : "阵雨局部有雨";
      return currentLang === 'EN' ? "Stable Dynamic Conditions" : "天气温和";
    }

    // --- RENDERING GENERATORS ---
    function renderDayTabs() {
      const tabsContainer = document.getElementById('day-tabs-container');
      tabsContainer.innerHTML = '';

      itineraryData.forEach((day, index) => {
        const isSelected = (index === currentDayIndex);
        const label = (currentLang === 'EN') ? day.labelEN : day.labelZH;
        
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = `px-4 py-2 text-xs font-semibold rounded-full shrink-0 transition-all cursor-pointer ${
          isSelected 
            ? 'bg-slate-900 text-white shadow-sm font-bold' 
            : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
        }`;
        btn.innerText = label;
        btn.onclick = () => {
          currentDayIndex = index;
          renderDayTabs();
          renderTimeline(index);
          // Center selected badge inside top header container view
          document.getElementById('active-date-badge').innerText = day.date;
        };
        tabsContainer.appendChild(btn);
      });
    }

    function renderTimeline(dayIndex) {
      const container = document.getElementById('timeline-container');
      container.innerHTML = '';
      
      const dayData = itineraryData[dayIndex];
      const dict = uiDictionary[currentLang];

      dayData.timeline.forEach((item) => {
        const title = (currentLang === 'EN') ? item.titleEN : item.titleZH;
        const durationText = (currentLang === 'EN') ? item.durationEN : item.durationZH;
        const shoppingText = (currentLang === 'EN') ? item.shoppingEN : item.shoppingZH;
        const foodText = (currentLang === 'EN') ? item.foodEN : item.foodZH;

        // Base card scaffolding using clean card containers highlighted by a subtle left vertical accent gradient bar
        const card = document.createElement('div');
        card.className = "bg-white border border-slate-100 rounded-xl shadow-xs overflow-hidden flex relative pl-3 py-4 pr-4 transition-all";
        
        // Vertical Left Accent Bar Construction
        const accentBar = document.createElement('div');
        accentBar.className = `absolute top-0 left-0 bottom-0 w-1.5 ${
          item.isFlight ? 'bg-gradient-to-b from-amber-400 to-orange-500' : 'bg-gradient-to-b from-indigo-500 to-teal-400'
        }`;
        card.appendChild(accentBar);

        // Core Inner Card Body Elements
        const body = document.createElement('div');
        body.className = "w-full space-y-3";

        // Time + Title Segment
        const titleRow = document.createElement('div');
        titleRow.className = "flex items-start gap-2.5";
        
        const timeBadge = document.createElement('span');
        timeBadge.className = "bg-slate-100 text-slate-800 text-[11px] font-bold font-mono px-2 py-0.5 rounded-md mt-0.5 shrink-0";
        timeBadge.innerText = item.time;

        const headingElement = document.createElement('h3');
        headingElement.className = "text-sm font-bold text-slate-900 tracking-tight leading-snug";
        headingElement.innerText = title;

        titleRow.appendChild(timeBadge);
        titleRow.appendChild(headingElement);
        body.appendChild(titleRow);

        // Travel Distance/Duration Badge placement directly below Title
        const badgeDiv = document.createElement('div');
        badgeDiv.className = "inline-flex items-center gap-1.5 bg-indigo-50 text-indigo-700 text-xs font-semibold px-2.5 py-1 rounded-lg";
        badgeDiv.innerHTML = `<span>${durationText}</span>`;
        body.appendChild(badgeDiv);

        // CONDITIONAL FLIGHT LIVE TERMINAL MODULE
        if (item.isFlight && item.flightDetails) {
          const f = item.flightDetails;
          const liveStatusText = (currentLang === 'EN') ? f.statusEN : f.statusZH;
          
          const flightBoard = document.createElement('div');
          flightBoard.className = "bg-slate-950 border border-slate-800 text-amber-400 font-mono text-[11px] rounded-lg p-3 space-y-2 shadow-inner";
          flightBoard.innerHTML = `
            <div class="flex justify-between items-center text-[10px] text-slate-500 border-b border-slate-800 pb-1 font-sans">
              <span>✈️ ${dict.flightBoardTitle}</span>
              <span class="text-slate-400 font-bold">${f.carrier}</span>
            </div>
            <div class="grid grid-cols-2 gap-y-2 gap-x-4 pt-1">
              <div>
                <span class="block text-[9px] text-slate-500 font-sans uppercase">${dict.schDep}</span>
                <span class="text-sm font-bold tracking-wider text-slate-100">${f.depTime}</span>
              </div>
              <div>
                <span class="block text-[9px] text-slate-500 font-sans uppercase">${dict.terminal}</span>
                <span class="text-sm font-bold text-slate-100">${f.terminal}</span>
              </div>
              <div>
                <span class="block text-[9px] text-slate-500 font-sans uppercase">${dict.gate}</span>
                <span class="text-sm font-bold text-slate-100">${f.gate}</span>
              </div>
              <div>
                <span class="block text-[9px] text-slate-500 font-sans uppercase">${dict.status}</span>
                <span class="text-xs font-bold text-emerald-400 px-1 py-0.5 rounded bg-emerald-950/40 border border-emerald-900/50 inline-block mt-0.5">${liveStatusText}</span>
              </div>
            </div>
          `;
          body.appendChild(flightBoard);
        }

        // TWO DYNAMIC BEAUTIFULLY STRUCTURED TARGET BOXES (Zero Senior Notes)
        const targetsGrid = document.createElement('div');
        targetsGrid.className = "grid grid-cols-1 gap-2 pt-1";

        // Box A: What to Buy / Shopping Target
        const buyBox = document.createElement('div');
        buyBox.className = "bg-amber-50/60 border border-amber-100/70 rounded-lg p-2.5";
        buyBox.innerHTML = `
          <h4 class="text-xs font-bold text-amber-800 flex items-center gap-1 mb-0.5">${dict.buyTitle}</h4>
          <p class="text-xs text-slate-600 leading-relaxed font-medium">${shoppingText}</p>
        `;

        // Box B: Food Suggestion Target (Includes Beef recommendations with family approval)
        const foodBox = document.createElement('div');
        foodBox.className = "bg-emerald-50/60 border border-emerald-100/70 rounded-lg p-2.5";
        foodBox.innerHTML = `
          <h4 class="text-xs font-bold text-emerald-800 flex items-center gap-1 mb-0.5">${dict.foodTitle}</h4>
          <p class="text-xs text-slate-600 leading-relaxed font-medium">${foodText}</p>
        `;

        targetsGrid.appendChild(buyBox);
        targetsGrid.appendChild(foodBox);
        body.appendChild(targetsGrid);

        card.appendChild(body);
        container.appendChild(card);
      });
    }

    // --- LIFE CYCLE INITIALIZATION ---
    window.addEventListener('DOMContentLoaded', () => {
      renderDayTabs();
      renderTimeline(currentDayIndex);
      fetchLiveWeather();
      
      // Auto refresh weather metrics every 5 minutes to stay accurate
      setInterval(fetchLiveWeather, 300000);
    });
  </script>

</body>
</html>
